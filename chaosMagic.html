<!DOCTYPE html>
<html>

    <head>
        <link rel="stylesheet" href="chaosStyle.css">
    </head>

    <body>
        
        <div class="workspace">

            

            <div id="settingsContainer">
                <button type="button" id="gameSettingsButton" onclick="setSettingsVisibility()">Hide Game Settings</button>
            <div id="gameSettings">
Configure your Chaos!
                <br/>
                <div id="playerCountSelector">
                    <!-- PlayerCount button switches state between "Duel" and "Group". The button text is passed to generateList() to filter the effect list. -->
                    <label for="playerCount">How many players?</label>
                    <button type="button" id="playerCountButton" onclick="switchPlayerCount()">Duel</button><span id="playerCountText">1 v 1</span>
                    <br/>
                </div>
                
                <div id="listSelector">
                    <!-- List choice selector controls the base list, as well as other inputs. The selected value is passed to generateList() to filter the effect list. -->
                    <label for="listBase">Choose a list:</label>
                    <select type="select-one" id="listBase" size="6" onclick="setGameControlVisibility()"><!-- TODO: infobubble that displays list details on mouseover/tap -->
                        <option>Micro</option><!-- Selecting this hides the "Repetition" control. Other selections should show "Repetition". -->
                        <option selected>Lite</option>
                        <option>Exemplar</option><!-- Selecting this shows the "Theme" control. Other selections should hide "Theme". -->
                        <option>Legacy</option>
                        <option>Full</option>
                        <option>Custom</option><!-- Selecting this shows the "School", "Duration", and "Rarity" controls. Other selections should hide them. -->
                    </select>
                    <span id="debugSelectionIndex"></span>
                    <br/>
                </div>
                <div id="vengeanceSelector">
                    <!-- Vengeance selector controls visibility of the "Vengeance" button (and associated roll output) -->
                    <label for="vengeanceToggle">Vengeance</label>
                    <input type="checkbox" id="vengeanceToggle" value="vengeance" onclick="setVengeanceVisibility()" checked/>
                    <br/>
                </div>
                <div id="minigameSelector">
                    <!-- Minigame selector controls visibility of "Minigame" button, as well as "minigame delay". This will also require some sort of turn tracker?-->
                    <label for="minigameToggle">Minigames</label>
                    <input type="checkbox" id="minigameToggle" value="minigame" onclick="setMinigameDelayVisibility()"/>
                    <span id="minigameDelaySetting" style="display:none">
                        <label for="minigameDelay">Turns between minigames</label>
                        <input type="range" class="slider" id="minigameDelay" min="1" max="10" value="1"><span id="delayNum"></span>
                    </span>
                    <br/>
                </div>
                <div id="exemplarThemeSelector" style="display:none">
                    <!-- Theme selector controls Theme subtable for Exemplar. -->
                    <label for="themeSelector">Exemplar Theme Table</label>
                    <label for="allThemes">All</label> <!-- Quick "select all" checkbox -->
                    <input type="checkbox" id="allThemes" value="allThemes" onclick="switchThemeMulti(); selectAll('allThemes', 'exemplarTheme')" /><!-- WRITE THIS FUNCTION on check set .type="select-multiple" and .multiple = false then for each select. if unchecked do the opposite-->
                    <select type="select-one" id="exemplarTheme" size="8" onclick="uncheckThemeAll()"><!-- TODO: infobubble that displays theme details on mouseover/tap -->
                        <option selected>Tokenizer</option>
                        <option>Complexity</option>
                        <option>Sound-Alike</option>
                        <option>Prodigal</option><!-- If interacted with after ALL is checked, uncheck ALL and set .type="select-multiple" and .multiple = false -->
                        <option>Beat</option>
                        <option>University</option>
                        <option>Toxin</option>
                        <option>Bad Things</option>
                    </select>
                    <br/>
                </div>
                <div id="customSchoolSelector" style="display:none">
                    <!-- School selector controls school filter logic. -->
                    <label for="schoolSelector">Choose included schools of magic (Shift and Ctrl click to select multiple)</label>
                    <label for="allSchools">All</label> <!-- Quick "select all" checkbox -->
                    <input type="checkbox" id="allSchools" value="allSchools" onclick="selectAll('allSchools', 'customSchool')" checked/><!-- WRITE THIS FUNCTION -->
                    <select type="select-multiple" id="customSchool" size="9" multiple onclick="testSelectAll('allSchools', 'customSchool')"><!-- TODO: infobubble that displays school details on mouseover/tap -->
                        <option selected>Abjuration</option>
                        <option selected>Chronomancy</option>
                        <option selected>Conjuration</option>
                        <option selected>Divination</option><!-- SEE NOTES ON RARITY SELECTOR BEHAVIOUR -->
                        <option selected>Enchantment</option>
                        <option selected>Evocation</option>
                        <option selected>Illusion</option>
                        <option selected>Necromancy</option>
                        <option selected>Transmutation</option>
                    </select>
                    <br/>
                </div>
                <button type="button" id="generateSchool" onclick="generateArrayToEncode('customSchool')">Generate Array Schools</button>
                <button type="button" id="encodeSchool" onclick="encodeArrayToBitwise(generatedArray)">Bitwise Encode Schools</button>
                <button type="button" id="decodeSchool" onclick="decodeArrayFromBitwise(encodedValue, encodedValueLength)">Bitwise Decode Schools</button>
                <br />
                <button type="button" id="genEnDeSchool" onclick="doItAll('customSchool')">Do all Three</button>
                <br />
                Generated School Array: <span id="debugGeneratedSchool"></span>
                <br />
                Generated School Array Length: <span id="debugGeneratedSchoolLength"></span>
                <br />
                Encoded School Value: <span id="debugEncodedSchool"></span>
                <br />
                Encoded School Value Length: <span id="debugEncodedSchoolLength"></span>
                <br />
                Decoded School Array: <span id="debugDecodedSchool"></span>




                <div id="customDurationSelector" style="display:none">
                    <!-- Duration selector controls duration filter logic. -->
                    <label for="durationSelector">Choose included durations of effects (Shift and Ctrl click to select multiple)</label>
                    <label for="allDurations">All</label> <!-- Quick "select all" checkbox -->
                    <input type="checkbox" id="allDurations" value="allDurations" onclick="selectAll('allDurations', 'customDuration')" checked/><!-- WRITE THIS FUNCTION -->
                    <select type="select-multiple" id="customDuration" size="4" multiple onclick="testSelectAll('allDurations', 'customDuration')"><!-- TODO: infobubble that displays duration explanation on mouseover/tap -->
                        <option selected>Instant</option>
                        <option selected>Turn</option>
                        <option selected>Round</option><!-- SEE NOTES ON RARITY SELECTOR BEHAVIOUR -->
                        <option selected>Ongoing</option>
                    </select>
                    <br/>
                </div>
                <div id="customRaritySelector" style="display:none">
                    <!-- Rarity selector controls rarity filter logic. -->
                    <label for="raritySelector">Choose included rarity of effects (Shift and Ctrl click to select multiple)</label>
                    <label for="allRarities">All</label> <!-- Quick "select all" checkbox -->
                    <input type="checkbox" id="allRarities" value="allRarities" onclick="selectAll('allRarities', 'customRarity')" checked/><!-- WRITE THIS FUNCTION -->
                    <select type="select-multiple" id="customRarity" size="4" multiple onclick="testSelectAll('allRarities', 'customRarity')"><!-- TODO: infobubble that displays rarity descriptions on mouseover/tap -->
                        <option selected>Common</option><!-- SCRIPT DREAMS: Initially, all are selected. If interaction occurs and not all are selected, uncheck ALL -->
                        <option selected>Uncommon</option><!-- If all are manually selected, check ALL -->
                        <option selected>Rare</option><!-- If ALL is checked, for each if unselected then select -->
                        <option selected>Mythic</option><!-- If ALL is unchecked, for each unselect -->
                    </select>
                    <br/>
                </div>
                <div id="customRarityMattersSelector" style="display:none">
                    <!-- Rarity Matters selector impacts randomization. -->
                    <label for="customRarityMattersToggle">Rarity Matters?</label><!-- TODO: Infobubble for What this Means?! -->
                    <input type="checkbox" id="customRarityMattersToggle" value="rarityMatters"/>
                    <br/>
                </div>
                <div id="repetitionSelector">
                    <!-- Repetition selector impacts randomization. -->
                    <label for="repetitionToggle">Repeat Effects?</label><!-- TODO: Infobubble for What this Means?! -->
                    <input type="checkbox" id="repetitionToggle" value="repetition" checked/>
                    <br/>
                </div>
                <div id="updateGame">
                    <button type="button" id="updateSettingsButton" onclick="updateGameSettings()">Update Game Settings</button>This will reset the current game!
                    <!-- This should pop a confirm alert, and if confirmed, update the randomizer configuration and wipe the current effect and history-->
                </div>

            </div><!-- End of "gameSettings" -->

            </div><!-- End of "settingsContainer" -->

            <div id="gameContainer">

                <div id="generateEffect">
                    <input type="button" value="ROLL" onclick="getEffect">
                </div>
                <div id="generateVengeance">
                    <button type="button" id="vengeanceButton" onclick="getVengeance()">Vengeance</button>
                </div>

                <div id="effectDisplay">

                </div>

                <div id="effectHistory">

                </div>
            </div><!-- End of "gameContainer" -->

        </div><!-- End of "workspace" -->

<!-- Scripts come after this. -->

<script src="scripts/chaosEffect.js" type="text/javascript"></script>


    </body>

</html>
